name: kreiseck_validator
description: >-
  Zero-dependency validation, normalization and formatting for email, phone,
  URL, IBAN, credit-card, license-plate, IMEI, ICCID, MAC, VIN and postal-code
  input. Global phone support; DACH-aware. By Kreiseck.
version: 0.8.0
homepage: https://kreiseck.com
repository: https://github.com/kreiseck-at/kreiseck_validator
issue_tracker: https://github.com/kreiseck-at/kreiseck_validator/issues
documentation: https://pub.dev/documentation/kreiseck_validator/latest/
topics:
  - validation
  - formatting
  - email
  - phone
  - iban
environment:
  sdk: ">=3.0.0 <4.0.0"
dev_dependencies:
  lints: ^4.0.0
  test: ^1.24.0
